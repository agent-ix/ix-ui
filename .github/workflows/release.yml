name: Release

on:
  push:
    tags: ["*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # OIDC token for npm Trusted Publishing (no-op for token-based GH Packages)

jobs:
  ci:
    uses: agent-ix/nodejs-actions/.github/workflows/release-monorepo.yml@main
    with:
      npm_registry: https://registry.npmjs.org
      trusted_publish: true
      node_version: "22"   # OIDC Trusted Publishing requires Node >= 22.14
